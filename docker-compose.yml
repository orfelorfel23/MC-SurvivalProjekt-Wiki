services:
  db:
    image: postgres:15
    container_name: mc_wiki_postgres
    restart: always
    environment:
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD: wiki_password
      POSTGRES_DB: mc_wiki
    ports:
      - "25560:5432"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/mc-survival-wiki/db-data:/var/lib/postgresql/data

  web:
    build: .
    container_name: mc_wiki_web
    restart: always
    environment:
      DATABASE_URL: "postgresql://wiki_user:wiki_password@db:5432/mc_wiki?schema=public"
      BETTER_AUTH_SECRET: "super-secret-key-for-development"
      BETTER_AUTH_URL: "https://mc-survival-wiki.orfel.de"
      BETTER_AUTH_TRUSTED_ORIGINS: "http://localhost:3000,https://mc-survival-wiki.orfel.de"
    ports:
      - "3000:3000"
    depends_on:
      - db

  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: mc_wiki_pg_backup
    restart: always
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: mc_wiki
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD: wiki_password
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/mc-survival-wiki/backups:/backups


